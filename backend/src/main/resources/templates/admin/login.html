<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админ-панель — FunnyEnglish</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}" href="../static/css/admin.css">
</head>
<body class="login-page">
    <div class="login-card">
        <h1>🎮 FunnyEnglish</h1>
        <p>Админ-панель</p>
        <form method="post" th:action="@{/admin/login}">
            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" placeholder="admin" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="admin123" required>
            </div>
            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
