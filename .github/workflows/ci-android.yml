name: CI Android

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'android/**'
      - '.github/workflows/ci-android.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'android/**'
      - '.github/workflows/ci-android.yml'

jobs:
  android-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlintCheck
        run: ./gradlew ktlintCheck --no-daemon --console=plain

      - name: Run detekt
        run: ./gradlew detekt --no-daemon --console=plain

      - name: Run Android Lint
        run: ./gradlew :app:lintDebug --no-daemon --console=plain

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --console=plain

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --console=plain

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: |
            android/app/build/reports/lint-results-debug.html
            android/app/build/reports/detekt/detekt.html
            android/**/build/reports/ktlint/**/*.html

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: android/**/build/reports/tests/**/
