name: Release AI Model

on:
  push:
    tags:
      - 'model-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify model file exists
        run: |
          ls -lh android/model_asset_pack/src/main/assets/

      - name: Create GitHub Release with model
        uses: softprops/action-gh-release@v1
        with:
          name: "AI Model ${{ github.ref_name }}"
          body: |
            Release of the Gemma 2B IT GPU INT4 model for FunnyEnglish.
            
            Used for fallback download (RuStore / debug builds).
            Google Play builds use Play Asset Delivery instead.
          files: |
            android/model_asset_pack/src/main/assets/gemma-2b-it-gpu-int4.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
