name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: cr.yandex
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-android:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create keystore.properties
        run: |
          cd android
          echo "storeFile=funnyenglish-release.keystore" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=funnyenglish" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Decode keystore
        run: |
          cd android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > funnyenglish-release.keystore

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload mapping artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-mapping
          path: android/app/build/outputs/mapping/release/mapping.txt

  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: cd backend && ./gradlew bootJar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          cd backend
          docker build -t funnyenglish-backend:${{ env.IMAGE_TAG }} .
          docker tag funnyenglish-backend:${{ env.IMAGE_TAG }} funnyenglish-backend:latest

      - name: Save Docker image
        run: |
          docker save funnyenglish-backend:${{ env.IMAGE_TAG }} | gzip > backend-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar.gz

  build-bot:
    name: Build Bot Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t funnyenglish-bot:${{ env.IMAGE_TAG }} .
          docker tag funnyenglish-bot:${{ env.IMAGE_TAG }} funnyenglish-bot:latest

      - name: Save Docker image
        run: |
          docker save funnyenglish-bot:${{ env.IMAGE_TAG }} | gzip > bot-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: bot-image
          path: bot-image.tar.gz

  deploy:
    name: Deploy to Server
    needs: [build-backend, build-bot]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: ./deploy

      - name: Download bot image
        uses: actions/download-artifact@v4
        with:
          name: bot-image
          path: ./deploy

      - name: Copy docker-compose and nginx config
        run: |
          mkdir -p ./deploy/nginx
          cp docker-compose.prod.yml ./deploy/
          cp nginx/nginx.conf ./deploy/nginx/
          cp .env.example ./deploy/.env

      - name: Deploy to server via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/*"
          target: "/opt/funnyenglish"
          strip_components: 1

      - name: Start services on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/funnyenglish
            # Load Docker images
            docker load < backend-image.tar.gz
            docker load < bot-image.tar.gz
            # Tag images
            docker tag funnyenglish-backend:${{ env.IMAGE_TAG }} funnyenglish-backend:latest
            docker tag funnyenglish-bot:${{ env.IMAGE_TAG }} funnyenglish-bot:latest
            # Start services
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d
            # Cleanup
            docker system prune -f
            # Health check
            sleep 10
            curl -sf http://localhost:8080/actuator/health || echo "Health check failed"

  # Optional: Deploy to Yandex Cloud Container Registry
  deploy-yandex:
    name: Push to Yandex Cloud Registry
    needs: [build-backend, build-bot]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: ./deploy

      - name: Download bot image
        uses: actions/download-artifact@v4
        with:
          name: bot-image
          path: ./deploy

      - name: Setup Yandex Cloud CLI
        uses: yc-actions/yc-sls-function@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Push to Yandex Container Registry
        run: |
          echo "${{ secrets.YC_SA_JSON_CREDENTIALS }}" | docker login -u json_key --password-stdin cr.yandex
          docker load < ./deploy/backend-image.tar.gz
          docker load < ./deploy/bot-image.tar.gz
          docker tag funnyenglish-backend:${{ env.IMAGE_TAG }} cr.yandex/${{ secrets.YC_REGISTRY_ID }}/funnyenglish-backend:${{ env.IMAGE_TAG }}
          docker tag funnyenglish-bot:${{ env.IMAGE_TAG }} cr.yandex/${{ secrets.YC_REGISTRY_ID }}/funnyenglish-bot:${{ env.IMAGE_TAG }}
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/funnyenglish-backend:${{ env.IMAGE_TAG }}
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/funnyenglish-bot:${{ env.IMAGE_TAG }}
