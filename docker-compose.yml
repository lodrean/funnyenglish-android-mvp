version: '3.8'

services:
  bot:
    build: .
    container_name: tictactoe-bot
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BACKEND_URL=http://backend:8080
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - funnyenglish
    cap_add:
      - NET_ADMIN
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: funnyenglish-backend
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
    restart: always
    networks:
      - funnyenglish

networks:
  funnyenglish:
    driver: bridge
