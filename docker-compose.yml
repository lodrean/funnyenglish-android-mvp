version: '3.8'

services:
  bot:
    build: .
    container_name: tictactoe-bot
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - default
    cap_add:
      - NET_ADMIN
