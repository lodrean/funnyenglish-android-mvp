version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: funnyenglish-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/www:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - funnyenglish

  postgres:
    image: postgres:16-alpine
    container_name: funnyenglish-postgres
    environment:
      POSTGRES_DB: funnyenglish
      POSTGRES_USER: ${DB_USER:-funnyenglish}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped
    networks:
      - funnyenglish
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-funnyenglish} -d funnyenglish"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: funnyenglish-backend:1.0.0
    container_name: funnyenglish-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_USER=${DB_USER:-funnyenglish}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SERVER_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - funnyenglish

  bot:
    image: funnyenglish-bot:1.0.0
    container_name: funnyenglish-bot
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - funnyenglish

volumes:
  postgres_data:
  nginx_logs:

networks:
  funnyenglish:
    driver: bridge
